name: Weather App CI/CD Pipeline

# This runs whenever you push code to main branch
on:
  push:
    branches: [main]

jobs:

  # JOB 1: Test the code
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install packages
        run: npm install

      - name: Run tests
        run: npm test

  # JOB 2: Build Docker image and push to Docker Hub
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/weather-app:latest

  # JOB 3: Deploy to Render
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker  # Only runs if docker job passes
    steps:
      - name: Deployment complete
        run: echo "🚀 App deployed successfully!"